<!DOCTYPE html>

<div id="app">

    <div class="brand">🌾 稲作のことば</div>

      <span class="res" title="正答率">🎯 <span id="accuracy">--</span></span>
    </div>
    <nav id="nav">
      <button data-view="quiz" class="nav-btn">📖 学ぶ</button>
      <button data-view="farm" class="nav-btn">🌱 田んぼ</button>
      <button data-view="shop" class="nav-btn">🏪 ショップ</button>
      <button data-view="collection" class="nav-btn">📚 図鑑</button>
      <button data-view="pdf" class="nav-btn">📄 論文</button>
      <button data-view="help" class="nav-btn">❓</button>
      <button data-view="settings" class="nav-btn">⚙️</button>
    </nav>
  </header>
  <main id="screen"></main>
  <div id="toasts"></div>
  <div id="modal-root"></div>
